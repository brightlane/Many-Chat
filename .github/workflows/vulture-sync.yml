name: Vulture 10K Daily Sync

on:
  schedule:
    # Runs at 04:00 UTC every day (Prime crawling time)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Add any extra libraries here if needed in the future

      - name: Run Vulture Engine (Generate 50 Pages)
        run: python vulture_engine.py

      - name: Update Sitemap
        run: python sitemap_gen.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "vulture-bot@users.noreply.github.com"
          git add .
          # Only commit if there are actually changes to avoid errors
          git diff-index --quiet HEAD || git commit -m "Vulture Sync: Daily 50-page drip feed [$(date +'%Y-%m-%d')]"
          git push
